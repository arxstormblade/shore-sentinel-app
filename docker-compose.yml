name: shore-sentinel

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shore_sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-shore_sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-me-postgres-password}
    volumes: [postgres-data:/var/lib/postgresql/data]
    ports: ['${POSTGRES_PORT:-5432}:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes: [redis-data:/data]
    ports: ['${REDIS_PORT:-6379}:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-replace-me-minio-access}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-replace-me-minio-secret}
    volumes: [minio-data:/data]
    ports: ['${MINIO_PORT:-9000}:9000', '${MINIO_CONSOLE_PORT:-9001}:9001']
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 10s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_MINIO: http://${MINIO_ACCESS_KEY:-replace-me-minio-access}:${MINIO_SECRET_KEY:-replace-me-minio-secret}@minio:9000
    entrypoint: >
      /bin/sh -c "
      mc mb --ignore-existing minio/${MINIO_BUCKET:-shore-sentinel-artifacts} &&
      mc anonymous set download minio/${MINIO_BUCKET:-shore-sentinel-artifacts} &&
      echo 'bucket ready'
      "
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: [.env.example]
    environment:
      PORT: 4000
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-shore_sentinel}:${POSTGRES_PASSWORD:-replace-me-postgres-password}@postgres:5432/${POSTGRES_DB:-shore_sentinel}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-shore-sentinel-artifacts}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-replace-me-minio-access}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-replace-me-minio-secret}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-replace-me-seed-admin-password}
      SHORE_SENTINEL_ENABLE_SELF_UPDATE: ${SHORE_SENTINEL_ENABLE_SELF_UPDATE:-false}
      SHORE_SENTINEL_UPDATE_SCRIPT: ${SHORE_SENTINEL_UPDATE_SCRIPT:-/app/scripts/shore-sentinel-update.sh}
      SHORE_SENTINEL_APP_DIR: ${SHORE_SENTINEL_APP_DIR:-/workspace/shore360-workspace/apps/shore-sentinel}
      SHORE_SENTINEL_UPDATE_REMOTE: ${SHORE_SENTINEL_UPDATE_REMOTE:-origin}
      SHORE_SENTINEL_UPDATE_BRANCH: ${SHORE_SENTINEL_UPDATE_BRANCH:-main}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports: ['${API_PORT:-4000}:4000']
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:4000/health']
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    env_file: [.env.example]
    environment:
      NODE_ENV: development
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:4000}
      SHORE_SENTINEL_BASE_PATH: ${SHORE_SENTINEL_BASE_PATH:-/shore-sentinel}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/shore-sentinel-api}
      PORT: 3010
    ports: ['${WEB_PORT:-3010}:3010']
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:3010/shore-sentinel/dashboard']
      interval: 15s
      timeout: 5s
      retries: 5

  worker-python:
    build:
      context: ./workers/worker-python
    environment:
      PYTHON_WORKER_PORT: 4100
    ports: ['${PYTHON_WORKER_PORT:-4100}:4100']
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://127.0.0.1:4100/health']
      interval: 15s
      timeout: 5s
      retries: 5

  worker-node:
    build:
      context: .
      dockerfile: workers/worker-node/Dockerfile
    env_file: [.env.example]
    environment:
      NODE_ENV: development
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_URL: ${API_URL:-http://api:4000}
      PYTHON_WORKER_URL: ${PYTHON_WORKER_URL:-http://worker-python:4100}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-3}
      WORKER_BACKOFF_MS: ${WORKER_BACKOFF_MS:-5000}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
      worker-python:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  minio-data:
