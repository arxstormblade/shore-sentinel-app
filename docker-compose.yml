name: shore-sentinel

services:
  shore-sentinel:
    build:
      context: .
      dockerfile: container/Dockerfile
      # Keep the local Compose path single-platform so `docker compose up --build`
      # can load the image into the local engine. CI uses the pinned Buildx
      # invocation in quality-security.yml for the linux/amd64 + linux/arm64 OCI index.
      args:
        IMAGE_VERSION: "1.1.0"
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-0}
        VCS_REF: ${VCS_REF:-local}
    image: shore-sentinel-single:1.1.0
    labels:
      org.opencontainers.image.title: Shore Sentinel single-container
      org.opencontainers.image.version: "1.1.0"
    user: root
    environment:
      NODE_ENV: production
      PORT: 4000
      WEB_PORT: 3010
      POSTGRES_DB: ${POSTGRES_DB:-shore_sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-shore_sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      DATABASE_URL: postgresql://${POSTGRES_USER:-shore_sentinel}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@127.0.0.1:5432/${POSTGRES_DB:-shore_sentinel}
      REDIS_URL: ${REDIS_URL:-redis://127.0.0.1:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://127.0.0.1:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-shore-sentinel-artifacts}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD must be set}
      SHORE_SENTINEL_SECRET_KEY: ${SHORE_SENTINEL_SECRET_KEY:?SHORE_SENTINEL_SECRET_KEY must be set}
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:?INTERNAL_WORKER_TOKEN must be set}
      API_URL: http://127.0.0.1:4000
      PYTHON_WORKER_URL: http://127.0.0.1:4100
      PYTHON_WORKER_PORT: 4100
      WORKER_CONCURRENCY: 1
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-3}
      WORKER_BACKOFF_MS: ${WORKER_BACKOFF_MS:-5000}
    ports:
      - "127.0.0.1:${WEB_PORT:-3010}:3010"
      - "127.0.0.1:${API_PORT:-4000}:4000"
    volumes:
      - shore-sentinel-data:/var/lib/shore-sentinel
    tmpfs:
      - /run
      - /tmp
    read_only: true
    pids_limit: 256
    mem_limit: 4g
    cpus: 4.0
    restart: unless-stopped
    stop_grace_period: 45s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Bootstrap needs only ownership changes and su-exec's UID/GID transition.
    # The runtime verifier asserts that CapEff contains no other capability.
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "/opt/shore-sentinel/bin/healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  shore-sentinel-data:
